<!doctype html>
<html lang="zh-Hant"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<title>Learning 知識圖譜</title>
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif;
         background:#11141a; color:#e7e9ee; }
  header { padding:12px 16px; border-bottom:1px solid #232938; }
  header h1 { font-size:16px; margin:0 0 4px; }
  header p  { font-size:12px; margin:0; color:#9aa3b2; }
  #legend { padding:8px 16px; display:flex; flex-wrap:wrap; gap:10px;
            font-size:12px; border-bottom:1px solid #232938; }
  .lg { display:flex; align-items:center; gap:5px; }
  .dot { width:11px; height:11px; border-radius:3px; display:inline-block; }
  #net { width:100%; height:58vh; }
  #panel { padding:14px 16px; border-top:1px solid #232938; min-height:22vh; }
  #panel h2 { font-size:15px; margin:0 0 8px; line-height:1.4; }
  #panel .one { font-size:13px; color:#c7cdda; line-height:1.7; }
  #panel .meta { font-size:11px; color:#7d8698; margin-top:10px; }
  #panel .hint { color:#7d8698; font-size:13px; }
  .tag { display:inline-block; background:#1c2230; border:1px solid #2a3142;
         border-radius:10px; padding:1px 8px; margin:2px 4px 2px 0; font-size:11px; }
</style></head>
<body>
<header>
  <h1>Learning 知識圖譜</h1>
  <p>19 張卡 · 點一個節點看「一句話」· 雙指縮放 / 拖曳</p>
</header>
<div id="legend"></div>
<div id="net"></div>
<div id="panel"><span class="hint">點任一張卡看它的核心判斷。</span></div>
<script>
const DATA = {"nodes": [{"id": "benchmark-saturation-hides-real-gap", "label": "跑分飽和時，真實能力與分數的 gap 才是訊號", "group": "ai-industry-reading", "color": "#5b8def", "one": "當 SWE-bench Verified 逼近 95%、即將天花板化時，公開 benchmark 已失去鑑別力；真正的訊號藏在「公開分數 vs 隱藏任務集分數」的落差裡。", "fresh": "2026-05  # 含具體跑分，數字會過期；可遷移的是「看 gap」這招", "appears": ["ai-industry-reading", "coding-agents"]}, {"id": "open-source-is-the-commoditization-clock", "label": "開源復現速度是商品化的計時器", "group": "ai-industry-reading", "color": "#5b8def", "one": "商業模型的突破，1–3 個月後就會被開源社群復現；在 Hugging Face 上看到某能力被大量複製，等於看到它的護城河正在歸零、價格即將暴跌。", "fresh": "2026-05  # 含千問/Gemini 具體對比，數字會過期；可遷移的是「開源=商品化計時器」", "appears": ["ai-industry-reading", "llm-productization"]}, {"id": "read-signals-not-surface-numbers", "label": "讀信號，不讀表面數字", "group": "ai-industry-reading", "color": "#5b8def", "one": "判讀 AI 產業時，廠商給的表面數字（跑分、發布會、層數）鑑別力最低；真正的訊號藏在「表面之下還在動的東西」——隱藏任務集的 gap、開源復現的速度、價值悄悄流向的部門。", "fresh": "", "appears": ["ai-industry-reading", "coding-agents", "llm-productization"]}, {"id": "structure-not-portability-is-agent-os-value", "label": "Agent OS 的真值是強迫結構化，不是跨工具", "group": "ai-industry-reading", "color": "#5b8def", "one": "「跨 Codex / Claude / Gemini」是 Agent OS 的賣相，但真正在做的事是「強迫你把 identity / context / guardrails 分檔」——如果你的設計已經結構化，它的邊際價值很有限。", "fresh": "", "appears": ["ai-industry-reading", "coding-agents"]}, {"id": "value-flows-to-the-relational-sector", "label": "AI 商品化後，價值流向「關係型部門」", "group": "ai-industry-reading", "color": "#5b8def", "one": "AI 不會抹消勞動，而是把經濟價值重心推向需要「人的在場、來歷、品味、關懷與關係」的領域——護理、教學、現場表演、款待業等。", "fresh": "", "appears": ["ai-industry-reading"]}, {"id": "antigravity-three-surface-architecture", "label": "三面架構讓 agent 取得視覺感知能力", "group": "coding-agents", "color": "#e0633a", "one": "Antigravity 讓 agent 同時操作編輯器、終端、瀏覽器三個介面，這使它成為唯一能「看見」自己產出結果的 coding agent。", "fresh": "", "appears": ["coding-agents", "multi-modal-agents", "frontend-development"]}, {"id": "artifact-verifiable-output", "label": "Artifact 是把 agent 產出變人類可審查的橋梁", "group": "coding-agents", "color": "#e0633a", "one": "Antigravity 讓 agent 產出任務清單、截圖、瀏覽器錄影等 Artifact，把「看 diff」升級成「看結果」，是把 agent 產出變人類可審查的關鍵抽象。", "fresh": "", "appears": ["coding-agents", "human-ai-collaboration", "agent-safety"]}, {"id": "async-vs-sync-agent-paradigm", "label": "非同步與同步是兩種 agent 工作範式", "group": "coding-agents", "color": "#e0633a", "one": "三家 coding agent 背後其實是兩種世界觀——agent 該像「外包包商」（交辦後等結果）還是「即時助理」（邊做邊談），這不是功能差異而是工作範式的根本分歧。", "fresh": "", "appears": ["coding-agents", "async-work-patterns", "future-of-work"]}, {"id": "claude-code-human-in-loop", "label": "Claude Code 的每步確認是哲學不是妥協", "group": "coding-agents", "color": "#e0633a", "one": "Claude Code 每一步都請求用戶確認，看起來是「還不夠自動化」，但實際上是把 agent 定位成「協作者」而非「代理人」的刻意設計。", "fresh": "", "appears": ["coding-agents", "human-ai-collaboration", "agent-safety"]}, {"id": "claude-code-six-layer-memory", "label": "六層記憶架構是對 agent 失憶問題的回應", "group": "coding-agents", "color": "#e0633a", "one": "Claude Code 用 CLAUDE.md、session memory、git history、progress file 等六層資訊讓新 session 不從零開始，核心命題是「agent 的價值不在單次產出，而在跨 session 累積」。", "fresh": "", "appears": ["coding-agents", "agent-architecture", "context-engineering"]}, {"id": "claude-md-as-project-contract", "label": "CLAUDE.md 是 agent 與專案之間的契約介面", "group": "coding-agents", "color": "#e0633a", "one": "CLAUDE.md 不只是「給 agent 看的說明書」，而是一份**會被精讀、會被遵守、會被團隊爭論的契約**——它讓「agent 行為」變成專案的公開約定，而不是每個使用者各自的私人設定。", "fresh": "", "appears": ["coding-agents", "team-conventions", "agent-architecture"]}, {"id": "codex-no-network-sandbox", "label": "Codex 的無網路沙箱用即時性換隔離性", "group": "coding-agents", "color": "#e0633a", "one": "Codex 每個任務跑在無網路的雲端容器裡，這讓它成為隔離性最強的 agent，但代價是犯錯無法中途修正、無法存取私有 API。", "fresh": "", "appears": ["coding-agents", "ai-security", "async-work-patterns"]}, {"id": "harness-beats-model", "label": "Harness 的影響大於換模型", "group": "coding-agents", "color": "#e0633a", "one": "同一個模型，搭配基礎 harness 得 42%、搭配優化 harness 得 78%，harness 的工程效益超過換一整代模型。", "fresh": "", "appears": ["coding-agents", "llm-productization", "future-of-ai-competition"]}, {"id": "harness-four-layers", "label": "Harness 由四個子系統組成", "group": "coding-agents", "color": "#e0633a", "one": "Harness = 工具調度 + 上下文管理 + 安全護欄 + 記憶持久化；不是單一層，而是四個獨立但耦合的子系統。", "fresh": "", "appears": ["coding-agents", "agent-architecture"]}, {"id": "harness-is-the-new-battlefield", "label": "Harness 會是 AI 工具下一階段的競爭主戰場", "group": "coding-agents", "color": "#e0633a", "one": "模型能力趨同後，差異化會從「誰的模型更強」轉移到「誰的 harness 更好」；工程資源、使用者體驗、生態整合等 harness 層決策，將決定贏家。", "fresh": "", "appears": ["coding-agents", "ai-market-dynamics", "product-strategy"]}, {"id": "isolation-vs-flexibility-tradeoff", "label": "隔離性與靈活性是負相關", "group": "coding-agents", "color": "#e0633a", "one": "agent 隔離得越徹底（Codex 無網路容器），能做的事越受限；靈活度越高（Claude Code 直接存取檔案系統），潛在風險越大——這是安全領域的通則，不只適用 AI。", "fresh": "", "appears": ["coding-agents", "ai-security", "system-design"]}, {"id": "latency-throughput-tradeoff", "label": "Agent 的即時性與吞吐量是零和權衡", "group": "coding-agents", "color": "#e0633a", "one": "越能即時回饋的 agent（Claude Code 每步確認），平行度越低；越能平行擴展的 agent（Codex 30 容器同開），即時性越差——這是架構層級的零和。", "fresh": "", "appears": ["coding-agents", "async-work-patterns", "system-design"]}, {"id": "mcp-as-extensibility-lever", "label": "MCP 把擴展性變成外部開放而非內建全能", "group": "coding-agents", "color": "#e0633a", "one": "Claude Code 用 MCP 把「連接任何外部系統」開放給第三方寫 adapter，不試圖自己內建所有整合——這是平台 vs 產品的根本選擇。", "fresh": "", "appears": ["coding-agents", "platform-strategy", "agent-architecture"]}, {"id": "model-capability-capped-by-harness", "label": "模型能力被 harness 設上限", "group": "coding-agents", "color": "#e0633a", "one": "Opus 4.6 在 Antigravity 裡被限制為 1% thinking token、200K context——同一個模型在不同 harness 下可達到的能力完全不同，harness 是模型能力的「天花板設定者」。", "fresh": "", "appears": ["coding-agents", "llm-productization", "model-provider-strategy"]}], "edges": [{"from": "read-signals-not-surface-numbers", "to": "harness-beats-model"}, {"from": "structure-not-portability-is-agent-os-value", "to": "claude-md-as-project-contract"}], "palette": {"ai-industry-reading": "#5b8def", "coding-agents": "#e0633a"}, "count": 19};
const legend = document.getElementById('legend');
for (const [t,c] of Object.entries(DATA.palette)) {
  const d = document.createElement('div'); d.className='lg';
  d.innerHTML = `<span class="dot" style="background:${c}"></span>${t}`;
  legend.appendChild(d);
}
const nodes = new vis.DataSet(DATA.nodes.map(n => ({
  id:n.id, label:n.label, color:{background:n.color,border:n.color},
  font:{color:'#e7e9ee', size:13, face:'sans-serif'},
  shape:'box', margin:8, widthConstraint:{maximum:150}
})));
const edges = new vis.DataSet(DATA.edges.map(e => ({
  from:e.from, to:e.to, color:{color:'#3a4456'},
  width:1.4, smooth:{type:'continuous'}
})));
const container = document.getElementById('net');
const net = new vis.Network(container, {nodes, edges}, {
  physics:{stabilization:true, barnesHut:{gravitationalConstant:-6000, springLength:120}},
  interaction:{hover:true, tooltipDelay:120}
});
const byId = Object.fromEntries(DATA.nodes.map(n=>[n.id,n]));
const panel = document.getElementById('panel');
net.on('click', p => {
  if (!p.nodes.length) return;
  const n = byId[p.nodes[0]];
  let meta = '';
  if (n.appears && n.appears.length)
    meta += n.appears.map(a=>`<span class="tag">${a}</span>`).join('');
  if (n.fresh) meta += `<span class="tag">時效 ${n.fresh}</span>`;
  panel.innerHTML = `<h2>${n.label}</h2>`
    + (n.one ? `<div class="one">${n.one}</div>` : `<div class="hint">（這張卡沒寫「一句話」）</div>`)
    + (meta ? `<div class="meta">${meta}</div>` : '');
});
</script>
</body></html>
